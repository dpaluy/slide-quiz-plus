<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide Quiz</title>
  <!-- Update version when slide-quiz major version changes -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slide-quiz@0.5/dist/participant.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .sq-loading { text-align: center; padding: 3rem 1rem; color: #888; }
    .sq-init-error { text-align: center; padding: 3rem 1rem; color: #c33; }
  </style>
</head>
<body>
  <div id="quiz-root"><p class="sq-loading">Connecting...</p></div>
  <!-- Update version when slide-quiz major version changes -->
  <script type="module">
    import {
      createParticipantUI,
      participantConfigFromUrlParams,
    } from 'https://cdn.jsdelivr.net/npm/slide-quiz@0.5/dist/participant.js';

    const params = new URLSearchParams(window.location.search);
    const configFromUrl = participantConfigFromUrlParams(params);
    const wsUrl = configFromUrl.wsUrl || 'wss://demo.anycable.io/cable';
    const quizGroupId = configFromUrl.quizGroupId || 'slidev-dev';

    if (!params.has('wsUrl')) {
      console.warn('[slide-quiz] No wsUrl parameter — using demo server');
    }

    try {
      createParticipantUI('#quiz-root', {
        wsUrl,
        quizGroupId,
        endpoints: configFromUrl.endpoints,
      });
    } catch (e) {
      console.error('[slide-quiz] Init failed:', e);
      document.getElementById('quiz-root').innerHTML =
        '<p class="sq-init-error">Failed to connect. Please refresh or scan the QR code again.</p>';
    }
  </script>
</body>
</html>
